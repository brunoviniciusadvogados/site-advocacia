backend:
  name: github
  repo: SEU_USUARIO/SEU_REPOSITORIO # Ex: bruno/meu-site
  branch: main

media_folder: "assets/images"
public_folder: "/assets/images"

collections:
  - name: "artigos"
    label: "Novos Artigos"
    folder: "content/artigos"
    create: true
    slug: "{{slug}}"
    format: "json"
    fields:
      - { label: "Título", name: "title", widget: "string" }
      - { label: "Autor", name: "author", widget: "string", default: "Dr. Bruno Faustino" }
      - { label: "Texto Completo", name: "body", widget: "markdown" }
      - { label: "Referência Bibliográfica", name: "reference", widget: "text", required: false }
      - { label: "Data de Publicação", name: "date", widget: "datetime" }
