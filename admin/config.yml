backend:
  name: github
  repo: brunoviniciusadvogados/site-advocacia # Seu repositório
  branch: main
  base_url: https://api.netlify.com # Gateway para autenticação

media_folder: "assets/images"
public_folder: "/assets/images"

collections:
  - name: "artigos"
    label: "Novos Artigos"
    folder: "content/artigos"
    create: true
    slug: "{{slug}}"
    format: "json"
    fields:
      - { label: "Título", name: "title", widget: "string" }
      - { label: "Autor", name: "author", widget: "string", default: "Dr. Bruno Faustino" }
      - { label: "Texto Completo", name: "body", widget: "markdown" }
      - { label: "Referência Bibliográfica", name: "reference", widget: "text", required: false }
      - { label: "Data", name: "date", widget: "datetime" }
