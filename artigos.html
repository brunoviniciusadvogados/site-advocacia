<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca de Análises | Dr. Bruno</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav class="container">
            <div class="logo">Dr. Bruno</div>
            <ul>
                <li><a href="index.html">Início</a></li>
                <li><a href="sobre.html">Sobre</a></li>
                <li><a href="artigos.html">Artigos</a></li>
                <li><a href="agendar.html">Agendar</a></li>
            </ul>
        </nav>
    </header>

    <main class="container" style="padding: 80px 0;">
        <h1>Biblioteca de Análises</h1>
        <div id="lista-artigos" class="artigos-grid">
            <p>Carregando histórico de publicações...</p>
        </div>
    </main>

    <script>
        const urlCSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRU8LfoWc3Wdz61bxNPUjYfjUULYqlDPdWbVyZNu43YpJzUzPCV0muA7XtAeMMyqpj5vRdBLVEvtb1-/pub?output=csv";

        fetch(urlCSV)
            .then(res => res.text())
            .then(data => {
                const linhas = data.split('\n').filter(l => l.trim() !== "");
                let html = "";
                
                // Pula a primeira linha (cabeçalho) e inverte para os novos virem primeiro
                const artigos = linhas.slice(1).reverse();

                artigos.forEach(linha => {
                    const col = linha.split(',');
                    html += `
                        <article class="artigo-card">
                            <span class="data-tag">${col[0]}</span>
                            <h3>${col[1]}</h3>
                            <p>${col[2]}</p>
                            <div class="artigo-footer">
                                <a href="${col[3]}" target="_blank" class="ler-link">Ler artigo completo</a>
                                <button onclick="compartilhar('${col[1]}', '${window.location.href}')" class="btn-share">
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8M16 6l-4-4-4 4M12 2v13"/></svg>
                                    Compartilhar
                                </button>
                            </div>
                        </article>
                    `;
                });
                document.getElementById('lista-artigos').innerHTML = html;
            });

        function compartilhar(titulo, url) {
            if (navigator.share) {
                navigator.share({ title: titulo, url: url }).catch(console.error);
            } else {
                navigator.clipboard.writeText(url);
                alert('Link copiado!');
            }
        }
    </script>

    <footer>
        <div class="container">
            <p><strong>Maldonado Advogados Associados</strong></p>
            <p>Porto Velho - Rondônia | OAB/RO 13.021</p>
        </div>
    </footer>
</body>
</html>
