// Substitua o bloco de script no seu artigos.html
<script>
    const urlTSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRU8LfoWc3Wdz61bxNPUjYfjUULYqlDPdWbVyZNu43YpJzUzPCV0muA7XtAeMMyqpj5vRdBLVEvtb1-/pub?gid=1525615232&single=true&output=tsv";

    async function carregarTudo() {
        try {
            const res = await fetch(urlTSV);
            const data = await res.text();
            const linhas = data.split('\n').filter(l => l.trim() !== "");
            
            // Inverte para o mais novo vir primeiro e trata campos vazios
            const artigos = linhas.slice(1).map(l => l.split('\t')).reverse();
            
            const sidebar = document.getElementById('sidebar-lista');
            sidebar.innerHTML += artigos.map((art, i) => `
                <div class="sidebar-item ${i === 0 ? 'active' : ''}" onclick="abrirArtigo(${i})" id="item-${i}">
                    ${art[1] || 'Sem Título'}
                </div>
            `).join('');

            if(artigos.length > 0) window.artigosCache = artigos;
            abrirArtigo(0);
        } catch (e) { console.error("Erro na carga:", e); }
    }

    function abrirArtigo(i) {
        const art = window.artigosCache[i];
        if(!art) return;

        document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
        document.getElementById(`item-${i}`).classList.add('active');

        // A lógica abaixo elimina o "undefined"
        document.getElementById('artigo-selecionado').innerHTML = `
            <h2 style="font-size: 2.4rem; color: #1e293b;">${art[1] || 'Título Indisponível'}</h2>
            <p style="color: #64748b; font-weight: bold; margin-bottom: 35px;">Autor: ${art[2] || 'Dr. Bruno Faustino'}</p>
            <div style="line-height: 1.8; color: #334155; font-size: 1.15rem; white-space: pre-wrap;">${art[3] || 'Conteúdo em processamento...'}</div>
            ${art[4] && art[4].trim() !== "" ? `<div style="margin-top: 40px; font-style: italic; color: #64748b;"><strong>Ref:</strong> ${art[4]}</div>` : ''}
        `;
    }
    carregarTudo();
</script>
