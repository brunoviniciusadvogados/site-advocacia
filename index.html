<main class="hero">
    <div class="container">
        <div class="hero-content">
            <span class="tag">Advocacia Plena & Estratégica</span>
            <h1>Soluções Jurídicas no <br><span class="destaque">Agronegócio e Direito Público</span></h1>
            <p>Gestão técnica de mais de 300 processos ativos com foco em resultados de alto impacto e segurança jurídica.</p>
            <div class="hero-btns" style="display: flex; gap: 15px; justify-content: center; align-items: center;">
                <a href="agendar.html" class="btn-moderno">AGENDAR REUNIÃO</a>
                <a href="sobre.html" class="btn-secundario" style="border: 1px solid white; padding: 12px 25px; border-radius: 5px; text-decoration: none; color: white;">CONHECER ATUAÇÃO</a>
            </div>
        </div>
    </div>
</main>

<script>
    const urlCSV = "SUA_URL_DO_CSV_AQUI"; // Certifique-se de que é o link do CSV

    fetch(urlCSV)
        .then(res => res.text())
        .then(data => {
            const linhas = data.split('\n').map(l => l.split(',')).filter(cols => cols.length > 1 && cols[1].trim() !== "");
            const ultima = linhas[linhas.length - 1]; 
            
            if(ultima) {
                document.getElementById('container-destaque').innerHTML = `
                    <div class="artigo-card-destaque">
                        <div class="artigo-info">
                            <span class="data-tag">${ultima[0] || ''}</span>
                            <h3>${ultima[1] || 'Título Indisponível'}</h3>
                            <p>${ultima[2] || 'Clique para ler a análise completa.'}</p>
                            <a href="artigos.html" class="ler-mais">Ver análise completa →</a>
                        </div>
                    </div>
                `;
            }
        }).catch(() => {
            document.getElementById('container-destaque').innerHTML = "<p>Erro ao carregar destaque. Verifique a planilha.</p>";
        });
</script>
